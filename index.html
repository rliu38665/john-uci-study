<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>UCI CS Study Hub — Locked</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0064a4">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#eaf2fb 0%,#f4f7fb 100%);color:#12324f;padding:24px}
  .card{width:100%;max-width:360px;background:#fff;border-radius:18px;padding:32px 26px;
    box-shadow:0 12px 40px rgba(0,60,120,.15);text-align:center}
  .lock{font-size:44px;line-height:1;margin-bottom:10px}
  h1{font-size:19px;margin:0 0 4px}
  p.sub{font-size:13px;color:#5b7590;margin:0 0 22px}
  input{width:100%;padding:13px 14px;font-size:16px;border:1.5px solid #cfdcea;border-radius:11px;
    outline:none;text-align:center;letter-spacing:.5px}
  input:focus{border-color:#0064a4}
  button{width:100%;margin-top:14px;padding:13px;font-size:16px;font-weight:600;color:#fff;
    background:#0064a4;border:none;border-radius:11px;cursor:pointer}
  button:active{background:#004f82}
  button:disabled{opacity:.6}
  .err{color:#c0392b;font-size:13px;min-height:18px;margin-top:12px}
  .foot{margin-top:18px;font-size:11px;color:#93a8bd}
</style>
</head>
<body>
<div class="card">
  <div class="lock">🔒</div>
  <h1>UCI CS Study Hub</h1>
  <p class="sub">This site is private. Enter the password to continue.</p>
  <form id="f" autocomplete="off">
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
    <button type="submit" id="go">Unlock</button>
  </form>
  <div class="err" id="err"></div>
  <div class="foot">Access is by permission only.</div>
</div>
<script>
const ITER=150000, KEY_LS="uci_study_pw";
const $=id=>document.getElementById(id);
const b64ToBytes=b=>Uint8Array.from(atob(b.trim()),c=>c.charCodeAt(0));
let BLOB=null;
async function loadBlob(){ if(BLOB) return BLOB; const r=await fetch("app.enc",{cache:"no-store"}); BLOB=await r.text(); return BLOB; }
async function deriveKey(pw,salt){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function decrypt(pw){
  const raw=b64ToBytes(await loadBlob());
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const key=await deriveKey(pw,salt);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
  return new TextDecoder().decode(pt);
}
function launch(html){ document.open(); document.write(html); document.close(); }
async function unlock(pw,fromStore){
  try{
    const html=await decrypt(pw);
    try{localStorage.setItem(KEY_LS,pw);}catch(e){}
    launch(html);
  }catch(e){
    if(fromStore){ try{localStorage.removeItem(KEY_LS);}catch(_){}}
    $("err").textContent="Wrong password. Try again.";
    $("go").disabled=false; $("pw").value=""; $("pw").focus();
  }
}
$("f").addEventListener("submit",ev=>{
  ev.preventDefault();
  const pw=$("pw").value; if(!pw) return;
  $("err").textContent=""; $("go").disabled=true;
  unlock(pw,false);
});
(async()=>{
  let saved=null; try{saved=localStorage.getItem(KEY_LS);}catch(e){}
  if(saved){ await unlock(saved,true); }
})();
</script>
</body>
</html>
